[blink]
version = "1"

[targets.homelab]
type         = "ssh"
host         = "blink"
user         = "admin"
base         = "/home/admin/barelabs"
runtime_dir  = "/home/admin/barelabs/runtime/blink-homelab"
binary_rel   = "runtime/blink-homelab/bin/bareclaw"
binary_path  = "/home/admin/barelabs/runtime/blink-homelab/bin/bareclaw"
service_name = "bearclaw"

[services.bearclaw]
description = "BearClaw daemon on the blink homelab host"
port        = "8080"

[services.bearclaw.source]
default = "local_docker"

[services.bearclaw.source.builds.local_docker]
type          = "containerized_local_build"
image         = "docker:cli"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "docker buildx build --platform ${TARGET_PLATFORM} --load -f Dockerfile.build -t bareclaw-builder:latest . && docker run --rm --platform ${TARGET_PLATFORM} -v ${BLINK_WORKSPACE_HOST}:/src -w /src/edge bareclaw-builder:latest zig build -Doptimize=ReleaseFast"
artifact      = "edge/zig-out/bin/bareclaw"
docker_socket = true

[services.bearclaw.source.builds.local_docker.env]
TARGET_PLATFORM = "linux/amd64"

[services.bearclaw.source.builds.github]
type  = "github_release"
repo  = "Bare-Labs/BearClaw"
asset = "bareclaw-linux-x86_64"

[services.bearclaw.deploy]
target            = "homelab"
pipeline          = ["fetch_artifact", "remote_script", "stop", "backup", "install", "start", "health_check", "verify"]
rollback_pipeline = ["rollback", "start", "health_check"]

[services.bearclaw.remote_script]
path = "deploy/blink/provision_remote.sh"

[services.bearclaw.stop]
command = "env XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user stop {{service_name}}.service || true && pkill -f '{{binary_path}} daemon' || true"

[services.bearclaw.install]
dest = "runtime/blink-homelab/bin/bareclaw"

[services.bearclaw.start]
command = "env XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user daemon-reload && env XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user enable --now {{service_name}}.service"

[services.bearclaw.health_check]
url      = "http://127.0.0.1:{{port}}/health"
timeout  = 30
interval = 2

[services.bearclaw.verify]
suite = "blink/suites/bearclaw_homelab.rb"
tags  = ["smoke", "health"]
